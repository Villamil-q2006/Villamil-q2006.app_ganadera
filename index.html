<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora Ganadera</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="fondo-animales">
    <img src="https://cdn-icons-png.flaticon.com/512/2343/2343316.png" alt="vaca" class="animal a1"/>
    <img src="https://cdn-icons-png.flaticon.com/512/1998/1998610.png" alt="gallina" class="animal a2"/>
    <img src="https://cdn-icons-png.flaticon.com/512/616/616412.png"   alt="cerdo" class="animal a3"/>
    <img src="https://cdn-icons-png.flaticon.com/512/2343/2343316.png" alt="vaca" class="animal a4"/>
    <img src="https://cdn-icons-png.flaticon.com/512/1998/1998610.png" alt="gallina" class="animal a5"/>
    <img src="https://cdn-icons-png.flaticon.com/512/616/616412.png"   alt="cerdo" class="animal a6"/>
    <img src="https://cdn-icons-png.flaticon.com/512/2343/2343316.png" alt="vaca" class="animal a7"/>
    <img src="https://cdn-icons-png.flaticon.com/512/1998/1998610.png" alt="gallina" class="animal a8"/>
  </div>

  <main class="contenedor">

    <header class="encabezado">
      <div class="linea-acento"></div>
      <p class="etiqueta-top">ACTIVIDAD SEMANA 2</p>
      <h1 class="titulo">Calculadora<br/><span>Ganadera</span></h1>
      <p class="subtitulo">Produccion diaria &bull; Ingresos &bull; Ganancia neta</p>
      <div class="linea-acento"></div>
    </header>

    <section class="tarjeta" id="formulario">
      <h2 class="tarjeta-titulo">DATOS DEL DIA</h2>

      <div class="grilla-2">
        <div class="campo">
          <label for="vacas">Numero de vacas</label>
          <input type="number" id="vacas" placeholder="Ej: 10" min="0" />
        </div>
        <div class="campo">
          <label for="litros">Litros por vaca</label>
          <input type="number" id="litros" placeholder="Ej: 15" min="0" step="0.1" />
        </div>
        <div class="campo">
          <label for="precio">Precio por litro ($)</label>
          <input type="number" id="precio" placeholder="Ej: 2500" min="0" step="0.01" />
        </div>
        <div class="campo">
          <label for="gastos">Gastos diarios ($)</label>
          <input type="number" id="gastos" placeholder="Ej: 50000" min="0" step="0.01" />
        </div>
      </div>

      <div class="acciones">
        <button class="btn-principal" id="btn-calcular">CALCULAR</button>
        <button class="btn-secundario" id="btn-limpiar">LIMPIAR</button>
      </div>
    </section>

    <section class="tarjeta" id="resultados">
      <h2 class="tarjeta-titulo">RESULTADOS</h2>

      <div class="metricas">
        <div class="metrica">
          <p class="metrica-etiqueta">Produccion total</p>
          <p class="metrica-valor" id="res-produccion">--</p>
          <p class="metrica-unidad">litros / dia</p>
        </div>
        <div class="metrica">
          <p class="metrica-etiqueta">Ingresos brutos</p>
          <p class="metrica-valor" id="res-ingresos">--</p>
          <p class="metrica-unidad">pesos / dia</p>
        </div>
        <div class="metrica metrica-grande" id="bloque-ganancia">
          <p class="metrica-etiqueta">GANANCIA NETA</p>
          <p class="metrica-valor grande" id="res-ganancia">--</p>
          <p class="metrica-unidad">pesos despues de gastos</p>
        </div>
      </div>

      <div class="alerta" id="mensaje-resultado"></div>
    </section>

  </main>

  <footer class="pie">
    <p>Calculadora Ganadera &mdash; HTML + CSS + JS &mdash; Semana 2</p>
  </footer>

  <script src="app.js"></script>

</body>
</html>
